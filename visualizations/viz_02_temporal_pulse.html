  }

];

const SLOTS = [
  {key:0, label:'05–07', sub:'Early Morning', range:'05:00 – 07:00'},
  {key:1, label:'07–09', sub:'AM Peak', range:'07:00 – 09:00'},
  {key:2, label:'11–13', sub:'Midday', range:'11:00 – 13:00'},
  {key:3, label:'16–18', sub:'PM Peak', range:'16:00 – 18:00'},
  {key:4, label:'19–21', sub:'Evening', range:'19:00 – 21:00'},
  {key:5, label:'21–23', sub:'Late Night', range:'21:00 – 23:00'},
  {key:6, label:'Sat 11–13', sub:'Saturday Midday', range:'11:00 – 13:00'},
];

const WORKABLE_THRESHOLD = 0.10;
let currentSlot = 1; // start at AM Peak
let playing = false;
let playInterval = null;

// =========================================================================
//  MAP
// =========================================================================
const map = L.map('map', {
  center: [46.38, 6.55],
  zoom: 10,
  zoomControl: true,
  attributionControl: true,
});

// Try Swiss topo tiles, fall back to Carto dark
const swissTiles = L.tileLayer('https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-farbe/default/current/3857/{z}/{x}/{y}.jpeg', {
  maxZoom: 18,
  attribution: '&copy; swisstopo',
});
const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  attribution: '&copy; OSM &copy; CARTO',
});

// Use Carto dark for better contrast with colored markers
cartoDark.addTo(map);

// Corridor polyline (stations in order)
const polyCoords = S.map(s => [s.la, s.lo]);
const corridorLine = L.polyline(polyCoords, {
  color: '#3a3a5a',
  weight: 2,
  opacity: 0.6,
  dashArray: '4,4',
}).addTo(map);

// =========================================================================
//  STATION MARKERS
// =========================================================================
function twciColor(v) {
  if (v < 0.05) return '#e74c3c';
  if (v < 0.15) return '#e67e22';
  if (v < 0.30) return '#f1c40f';
  return '#2ecc71';
}

function twciRadius(v) {
  return Math.max(4, v * 35);
}

const markers = S.map((s, i) => {
  const twci = s.t[currentSlot];
  const marker = L.circleMarker([s.la, s.lo], {
    radius: twciRadius(twci),
    fillColor: twciColor(twci),
    fillOpacity: 0.85,
    color: '#1a1a2e',
    weight: 1.5,
  }).addTo(map);

  marker.on('mouseover', function(e) {
    this.setStyle({color: '#ffffff', weight: 2.5});
    const sl = currentSlot;
    const twciVal = s.t[sl];
    const popup = L.popup({className: 'map-tooltip', closeButton: false, offset: [0, -8]})
      .setLatLng(e.latlng)
      .setContent(`
        <div class="station-name">${s.n}</div>
        <div class="stat-row"><span class="stat-label">TWCI</span><span class="stat-val" style="color:${twciColor(twciVal)}">${twciVal.toFixed(4)}</span></div>
        <div class="stat-row"><span class="stat-label">Trains/hr</span><span class="stat-val" style="color:#f1c40f">${s.f[sl]}</span></div>
        <div class="stat-row"><span class="stat-label">Workspaces</span><span class="stat-val">${s.ws[sl]}</span></div>
        <div class="stat-row"><span class="stat-label">IC deps</span><span class="stat-val">${s.ic[sl]}</span></div>
        <div class="stat-row"><span class="stat-label">Service</span><span class="stat-val">${s.ft} – ${s.lt}</span></div>
        <div class="stat-row"><span class="stat-label">Window</span><span class="stat-val">${s.svc > 0 ? s.svc.toFixed(1) + 'h' : 'No service'}</span></div>
        <div class="stat-row"><span class="stat-label">km from GVA</span><span class="stat-val">${s.km.toFixed(1)}</span></div>
      `)
      .openOn(map);
  });

  marker.on('mouseout', function() {
    this.setStyle({color: '#1a1a2e', weight: 1.5});
    map.closePopup();
  });

  return marker;
});

// =========================================================================
//  TIME SLOT BUTTONS
// =========================================================================
const slotsContainer = document.getElementById('timeSlots');
SLOTS.forEach((slot, i) => {
  const btn = document.createElement('button');
  btn.className = 'time-slot-btn' + (i === currentSlot ? ' active' : '');
  btn.innerHTML = `${slot.label}<span class="slot-label">${slot.sub}</span>`;
  btn.addEventListener('click', () => setSlot(i));
  slotsContainer.appendChild(btn);
});

function setSlot(idx) {
  currentSlot = idx;

  // Update buttons
  document.querySelectorAll('.time-slot-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });

  // Update markers
  S.forEach((s, i) => {
    const twci = s.t[idx];
    markers[i].setRadius(twciRadius(twci));
    markers[i].setStyle({
      fillColor: twciColor(twci),
      fillOpacity: twci < 0.01 ? 0.3 : 0.85,
    });
  });

  // Update overlay
  const slot = SLOTS[idx];
  document.getElementById('timeRange').textContent = slot.range;
  document.getElementById('timeSubtitle').textContent = slot.sub;

  // Update counter
  const workable = S.filter(s => s.t[idx] > WORKABLE_THRESHOLD).length;
  document.getElementById('counterValue').textContent = `${workable}/49`;

  // Update summary panel
  updateSummary(idx);
}

// =========================================================================
//  SUMMARY PANEL
// =========================================================================
function updateSummary(idx) {
  const twciVals = S.map(s => s.t[idx]);
  const workable = twciVals.filter(v => v > WORKABLE_THRESHOLD).length;
  const avgTwci = (twciVals.reduce((a,b) => a+b, 0) / twciVals.length);
  const totalIC = S.reduce((sum, s) => sum + s.ic[idx], 0);
  const totalFreq = S.reduce((sum, s) => sum + s.f[idx], 0);
  const maxTwci = S.reduce((best, s) => s.t[idx] > best.t[idx] ? s : best, S[0]);
  const zeroService = S.filter(s => s.f[idx] === 0).length;

  document.getElementById('summaryPanel').innerHTML = `
    <div class="summary-stat">
      <div class="stat-value green">${workable}/49</div>
      <div class="stat-label">Workable stations</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value blue">${avgTwci.toFixed(3)}</div>
      <div class="stat-label">Avg TWCI</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value yellow">${totalIC}</div>
      <div class="stat-label">IC departures</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value">${totalFreq.toFixed(0)}</div>
      <div class="stat-label">Total trains/hr</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value" style="font-size:14px;color:#2ecc71;">${maxTwci.n}</div>
      <div class="stat-label">Highest TWCI (${maxTwci.t[idx].toFixed(3)})</div>
    </div>
    <div class="summary-stat">
      <div class="stat-value red">${zeroService}</div>
      <div class="stat-label">Zero service</div>
    </div>
  `;
}

// =========================================================================
//  PLAY / PAUSE
// =========================================================================
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');

function togglePlay() {
  playing = !playing;
  if (playing) {
    playIcon.innerHTML = '<rect x="3" y="2" width="3" height="10" /><rect x="8" y="2" width="3" height="10" />';
    playInterval = setInterval(() => {
      const next = (currentSlot + 1) % SLOTS.length;
      setSlot(next);
    }, 1500);
  } else {
    playIcon.innerHTML = '<polygon points="3,1 12,7 3,13"/>';
    clearInterval(playInterval);
  }
}

playBtn.addEventListener('click', togglePlay);

// =========================================================================
//  INIT
// =========================================================================
setSlot(1); // AM Peak
map.fitBounds([[46.17, 6.05], [46.56, 7.02]], {padding: [20, 20]});
</script>
