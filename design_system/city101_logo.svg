<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&amp;family=DM+Mono:wght@400;500&amp;display=swap');
    </style>

    <!-- Primary: light on dark -->
    <symbol id="logo-dark" viewBox="0 0 320 80">
      <text x="0" y="52" font-family="'Instrument Serif', serif" font-size="48" font-weight="400" letter-spacing="6" fill="#e8e6e1">CITY</text>
      <text x="168" y="52" font-family="'DM Mono', monospace" font-size="48" font-weight="500" letter-spacing="2" fill="#c9a84c">101</text>
      <line x1="0" y1="64" x2="280" y2="64" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Subtle station dots on the line -->
      <circle cx="40" cy="64" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="100" cy="64" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="160" cy="64" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="220" cy="64" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="280" cy="64" r="2" fill="#c9a84c" opacity="0.7"/>
    </symbol>

    <!-- Inverted: dark on light -->
    <symbol id="logo-light" viewBox="0 0 320 80">
      <text x="0" y="52" font-family="'Instrument Serif', serif" font-size="48" font-weight="400" letter-spacing="6" fill="#0c0c14">CITY</text>
      <text x="168" y="52" font-family="'DM Mono', monospace" font-size="48" font-weight="500" letter-spacing="2" fill="#8a6f2e">101</text>
      <line x1="0" y1="64" x2="280" y2="64" stroke="#8a6f2e" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="40" cy="64" r="2" fill="#8a6f2e" opacity="0.5"/>
      <circle cx="100" cy="64" r="2" fill="#8a6f2e" opacity="0.5"/>
      <circle cx="160" cy="64" r="2" fill="#8a6f2e" opacity="0.5"/>
      <circle cx="220" cy="64" r="2" fill="#8a6f2e" opacity="0.5"/>
      <circle cx="280" cy="64" r="2" fill="#8a6f2e" opacity="0.7"/>
    </symbol>

    <!-- Monogram: C101 compact -->
    <symbol id="logo-monogram" viewBox="0 0 48 48">
      <text x="2" y="22" font-family="'Instrument Serif', serif" font-size="18" font-weight="400" fill="#e8e6e1">C</text>
      <text x="2" y="40" font-family="'DM Mono', monospace" font-size="16" font-weight="500" fill="#c9a84c">101</text>
      <line x1="2" y1="44" x2="46" y2="44" stroke="#c9a84c" stroke-width="1" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- Default render: dark variant -->
  <use href="#logo-dark" width="320" height="80"/>
</svg>
